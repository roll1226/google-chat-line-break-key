name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate icons
        run: npm run generate-icons

      - name: Set release tag
        id: tag
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          if ! printf '%s' "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version in manifest.json: '${VERSION}'. Expected X.Y.Z" >&2
            exit 1
          fi
          printf 'name=v%s\n' "${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create extension ZIP
        run: |
          zip -r googo-chat-line-break-key-${{ steps.tag.outputs.name }}.zip \
            manifest.json \
            src/ \
            icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09ce9571a6d1144cd # v2.2.1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: googo-chat-line-break-key-${{ steps.tag.outputs.name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
